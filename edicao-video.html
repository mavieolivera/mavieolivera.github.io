<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edição de Vídeo | Portfólio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f2e8dc;
      color: #121212;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 3rem 1.25rem 5rem;
    }

    h1 {
      font-size: clamp(2.4rem, 5vw, 4.8rem);
      line-height: .95;
      margin-bottom: .8rem;
    }

    p {
      line-height: 1.7;
      color: rgba(18,18,18,.8);
    }

    .card {
      background: white;
      border-radius: 22px;
      padding: 1.4rem;
      margin-top: 1.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,.06);
    }

    .back {
      display: inline-block;
      margin-bottom: 1.5rem;
      color: #315edb;
      font-weight: 700;
      text-decoration: none;
    }

    /* Instagram ajuste */
    .instagram-media {
      max-width: 100% !important;
      margin: 0 auto !important;
      border-radius: 16px !important;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <a class="back" href="index.html">← Voltar ao início</a>

    <h1>Edição de Vídeo</h1>

    <p>
      Projetos de edição audiovisual com foco em narrativa, ritmo e construção estética.
    </p>

    <!-- 🎬 CARD COM INSTAGRAM -->
    <div class="card">

      <blockquote 
        class="instagram-media" 
        data-instgrm-permalink="https://www.instagram.com/reel/DCRbQ3KpW2V/" 
        data-instgrm-version="14">
      </blockquote>

      <h2>Projeto — Edição para Instagram</h2>

      <p>
        Edição de vídeo para redes sociais com foco em ritmo dinâmico, retenção e estética visual.
      </p>

    </div>

  </div>

  <!-- SCRIPT DO INSTAGRAM -->
  <script async src="//www.instagram.com/embed.js"></script>

</body>
</html>
