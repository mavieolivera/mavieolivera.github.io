<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design | Portfólio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #f2e8dc;
      --text-color: #121212;
      --accent-color: #be3f56;
      --card-radius: 20px;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      overflow-x: hidden;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* --- CABEÇALHO --- */
    header {
      padding-top: 4rem;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      margin: 0;
      line-height: 1;
    }

    .subtitle {
      font-size: 1.1rem;
      opacity: 0.7;
      margin-top: 10px;
    }

    /* --- CARROSSEL INFINITO (PRINCIPAIS) --- */
    .slider-section {
      padding: 40px 0 80px;
    }

    .slider-track {
      display: flex;
      gap: 30px;
      animation: dialRotate 25s linear infinite;
      width: max-content;
    }

    .featured-item {
      flex: 0 0 320px;
      height: 400px;
      border-radius: var(--card-radius);
      overflow: hidden;
      position: relative;
      background: #e0d6c8;
      transform: rotate(1.5deg); /* O toque do telefone antigo */
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      box-shadow: 0 15px 35px rgba(0,0,0,0.08);
    }

    .featured-item:hover {
      transform: rotate(0deg) translateY(-10px);
      box-shadow: 0 20px 45px rgba(0,0,0,0.15);
      z-index: 2;
    }

    .featured-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* --- GRADE GERAL (MAIS TRABALHO) --- */
    .more-work {
      padding-bottom: 6rem;
      border-top: 1px solid rgba(0,0,0,0.05);
      padding-top: 4rem;
    }

    .section-title {
      text-align: center;
      margin-bottom: 3rem;
    }

    .section-title h2 {
      font-size: 2rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin: 0;
    }

    .grid-archive {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
    }

    .archive-card {
      background: #fff;
      border-radius: var(--card-radius);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.3s ease;
    }

    .archive-card:hover {
      transform: translateY(-5px);
    }

    .archive-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #eee;
      display: block;
      object-fit: cover;
    }

    .archive-info {
      padding: 1.2rem;
    }

    .archive-info h3 {
      margin: 0;
      font-size: 1rem;
    }

    .archive-info span {
      font-size: 0.85rem;
      opacity: 0.6;
    }

    /* ANIMAÇÃO */
    @keyframes dialRotate {
      0% { transform: translateX(0); }
      100% { transform: translateX(calc(-350px * 4)); }
    }

    .slider-section:hover .slider-track {
      animation-play-state: paused;
    }

    @media (max-width: 768px) {
      .grid-archive {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <header>
      <h1>Portfólio</h1>
      <p class="subtitle">Trabalhos em destaque e projetos selecionados.</p>
    </header>
  </div>

  <section class="slider-section">
    <div class="slider-track">
      <div class="featured-item">
        <img src="https://picsum.photos/seed/nike/600/800" alt="Nike">
      </div>
      <div class="featured-item">
        <img src="https://picsum.photos/seed/shake/600/800" alt="Shake Shack">
      </div>
      <div class="featured-item">
        <img src="https://picsum.photos/seed/art/600/800" alt="Ilustração">
      </div>
      <div class="featured-item">
        <img src="https://picsum.photos/seed/brand/600/800" alt="Branding">
      </div>
      <div class="featured-item"><img src="https://picsum.photos/seed/nike/600/800"></div>
      <div class="featured-item"><img src="https://picsum.photos/seed/shake/600/800"></div>
      <div class="featured-item"><img src="https://picsum.photos/seed/art/600/800"></div>
      <div class="featured-item"><img src="https://picsum.photos/seed/brand/600/800"></div>
    </div>
  </section>

  <section class="more-work">
    <div class="container">
      
      <div class="section-title">
        <h2>Mais Trabalho</h2>
        <p>Dê uma olhada, fique um pouco.</p>
      </div>

      <div class="grid-archive">
        
        <a href="#" class="archive-card">
          <img src="https://picsum.photos/seed/1/400/400" class="archive-img">
          <div class="archive-info">
            <h3>Projeto de Moeda</h3>
            <span>Ilustração</span>
          </div>
        </a>

        <a href="#" class="archive-card">
          <img src="https://picsum.photos/seed/2/400/400" class="archive-img">
          <div class="archive-info">
            <h3>Composição Abstrata</h3>
            <span>Design Gráfico</span>
          </div>
        </a>

        <a href="#" class="archive-card">
          <img src="https://picsum.photos/seed/3/400/400" class="archive-img">
          <div class="archive-info">
            <h3>Surf Vibes</h3>
            <span>Ilustração Digital</span>
          </div>
        </a>

        <a href="#" class="archive-card">
          <img src="https://picsum.photos/seed/4/400/400" class="archive-img">
          <div class="archive-info">
            <h3>Editorial Fashion</h3>
            <span>Layout</span>
          </div>
        </a>

        <a href="#" class="archive-card">
          <img src="https://picsum.photos/seed/5/400/400" class="archive-img">
          <div class="archive-info">
            <h3>App Redesign</h3>
            <span>UI/UX</span>
          </div>
        </a>

        <a href="#" class="archive-card">
          <img src="https://picsum.photos/seed/6/400/400" class="archive-img">
          <div class="archive-info">
            <h3>Tipografia Experimental</h3>
            <span>Arte</span>
          </div>
        </a>

      </div>
    </div>
  </section>

</body>
</html>
