<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design | Portfólio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f2e8dc;
      color: #121212;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 3rem 1.25rem 5rem;
    }

    h1 {
      font-size: clamp(2.4rem, 5vw, 4.8rem);
      line-height: .95;
      margin-bottom: .8rem;
    }

    p {
      line-height: 1.7;
      color: rgba(18,18,18,.8);
      max-width: 500px;
      margin-bottom: 2rem;
    }

    a {
      color: #be3f56;
      font-weight: 700;
      text-decoration: none;
    }

    .back {
      display: inline-block;
      margin-bottom: 1.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 2rem;
    }

    .project {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      background: #ddd;
    }

    .project img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .4s ease;
    }

    .project:hover img {
      transform: scale(1.05);
    }

    .overlay {
      position: absolute;
      bottom: 16px;
      left: 16px;
      color: white;
    }

    .overlay h2 {
      margin: 0;
      font-size: 1rem;
    }

    .overlay span {
      font-size: 0.8rem;
      opacity: 0.85;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

  </style>
</head>

<body>
  <div class="wrap">

    <a class="back" href="index.html">← Voltar ao início</a>

    <h1>Design</h1>

    <p>
      Projetos visuais com foco em identidade, estratégia e comunicação.
    </p>

    <div class="grid">

      <!-- PROJETO 1 -->
      <a href="#" class="project">
        <img src="assets/design1.png" alt="Projeto de identidade visual">
        <div class="overlay">
          <h2>Identidade Visual</h2>
          <span>Branding</span>
        </div>
      </a>

      <!-- PROJETO 2 -->
      <a href="#" class="project">
        <img src="assets/design2.png" alt="Post para redes sociais">
        <div class="overlay">
          <h2>Social Media</h2>
          <span>Conteúdo digital</span>
        </div>
      </a>

      <!-- PROJETO 3 -->
      <a href="#" class="project">
        <img src="assets/design3.png" alt="Projeto editorial">
        <div class="overlay">
          <h2>Editorial</h2>
          <span>Diagramação</span>
        </div>
      </a>

      <!-- PROJETO 4 -->
      <a href="#" class="project">
        <img src="assets/design4.png" alt="Campanha visual">
        <div class="overlay">
          <h2>Campanha</h2>
          <span>Direção criativa</span>
        </div>
      </a>

    </div>

  </div>
</body>
</html>
