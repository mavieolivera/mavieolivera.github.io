<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design | Portfólio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #f2e8dc;
      --text-color: #121212;
      --card-radius: 24px;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      scroll-behavior: smooth;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }

    .slider-section { padding: 60px 0; overflow: hidden; }

    .slider-track {
      display: flex;
      gap: 30px;
      animation: dialRotate 30s linear infinite;
      width: max-content;
    }

    .featured-item {
      flex: 0 0 320px;
      height: 420px;
      border-radius: var(--card-radius);
      overflow: hidden;
      transform: rotate(2deg);
      transition: all 0.4s ease;
      cursor: pointer;
    }

    .featured-item:hover {
      transform: rotate(0deg) scale(1.05);
      z-index: 5;
    }

    .featured-item img { width: 100%; height: 100%; object-fit: cover; }

    .more-work { padding: 100px 0; border-top: 1px solid rgba(0,0,0,0.05); }

    .grid-archive {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
    }

    .archive-card {
      background: #fff;
      border-radius: var(--card-radius);
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
    }

    .archive-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
    .archive-info { padding: 1.5rem; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      backdrop-filter: blur(8px);
    }

    .modal-content {
      background: white;
      width: 90%;
      max-width: 1000px;
      max-height: 90vh;
      border-radius: 30px;
      padding: 40px;
      overflow-y: auto;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 30px;
      cursor: pointer;
      border: none;
      background: none;
    }

    @keyframes dialRotate {
      0% { transform: translateX(0); }
      100% { transform: translateX(-1400px); } 
    }

    .slider-section:hover .slider-track { animation-play-state: paused; }
  </style>
</head>
<body>

  <div class="container">
    <h1 style="margin-top: 4rem;">Trabalho em Destaque</h1>
  </div>

  <section class="slider-section">
    <div class="slider-track">
      <div class="featured-item" onclick="goToProject('frugo')">
        <img src="https://picsum.photos/seed/frugo/500/700" alt="Frugo">
      </div>
      <div class="featured-item" onclick="goToProject('nike')">
        <img src="https://picsum.photos/seed/nike/500/700" alt="Nike">
      </div>
      <div class="featured-item" onclick="goToProject('frugo')"><img src="https://picsum.photos/seed/frugo/500/700"></div>
      <div class="featured-item" onclick="goToProject('nike')"><img src="https://picsum.photos/seed/nike/500/700"></div>
    </div>
  </section>

  <section id="mais-trabalho" class="more-work">
    <div class="container">
      <h2 style="text-align: center; margin-bottom: 3rem;">MAIS TRABALHO</h2>
      
      <div class="grid-archive">
        <div class="archive-card" id="card-frugo" onclick="openModal('frugo-modal')">
          <img src="https://picsum.photos/seed/frugo/500/500">
          <div class="archive-info"><h3>FRUGO</h3></div>
        </div>

        <div class="archive-card" id="card-nike" onclick="openModal('nike-modal')">
          <img src="https://picsum.photos/seed/nike/500/500">
          <div class="archive-info"><h3>NIKE INC.</h3></div>
        </div>
      </div>
    </div>
  </section>

  <div id="frugo-modal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-content">
      <button class="close-btn" onclick="hideAllModals()">&times;</button>
      <h2 style="text-align:center">FRUGO</h2>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <img src="https://picsum.photos/seed/f1/500/500" style="width:100%; border-radius:15px;">
        <img src="https://picsum.photos/seed/f2/500/500" style="width:100%; border-radius:15px;">
      </div>
    </div>
  </div>

  <div id="nike-modal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-content">
      <button class="close-btn" onclick="hideAllModals()">&times;</button>
      <h2 style="text-align:center">NIKE INC.</h2>
      <p style="text-align:center">Galeria do projeto Nike aqui...</p>
    </div>
  </div>

  <script>
    function goToProject(projectId) {
      document.getElementById('mais-trabalho').scrollIntoView({ behavior: 'smooth' });

      setTimeout(() => {
        openModal(projectId + '-modal');
      }, 600);
    }

    function openModal(modalId) {
      document.getElementById(modalId).style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function hideAllModals() {
      const modals = document.querySelectorAll('.modal-overlay');
      modals.forEach(m => m.style.display = 'none');
      document.body.style.overflow = 'auto';
    }

    function closeModal(event) {
      if (event.target.classList.contains('modal-overlay')) {
        hideAllModals();
      }
    }
  </script>
</body>
</html>
