<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design | Portfólio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f2e8dc;
      --text: #121212;
      --accent: #be3f56;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 0 1.5rem;
    }

    header {
      padding: 4rem 0 1rem;
    }

    .back {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    h1 {
      font-size: 3rem;
      margin: 10px 0;
    }

    /* CARROSSEL */
    .slider-wrapper {
      overflow: hidden;
      padding: 60px 0;
    }

    .slider-track {
      display: flex;
      gap: 30px;
      width: max-content;
      animation: scroll 30s linear infinite;
    }

    .slider-wrapper:hover .slider-track {
      animation-play-state: paused;
    }

    .card {
      width: 300px;
      height: 420px;
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transform: rotate(2deg);
      transition: 0.4s;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .card:hover {
      transform: rotate(0) scale(1.05);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @keyframes scroll {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    /* MODAL */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
      padding: 20px;
    }

    .modal-content {
      background: white;
      border-radius: 25px;
      max-width: 1000px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 40px;
    }

    .close {
      position: absolute;
      right: 30px;
      top: 20px;
      font-size: 30px;
      cursor: pointer;
    }

    .modal h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    .modal p {
      text-align: center;
      opacity: 0.7;
      margin-bottom: 30px;
    }

    /* GRID DAS IMAGENS */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .grid img {
      width: 100%;
      border-radius: 15px;
      object-fit: cover;
    }

    @media(max-width: 768px){
      .grid {
        grid-template-columns: 1fr;
      }
    }

  </style>
</head>

<body>

<div class="container">
  <header>
    <a href="index.html" class="back">← Voltar ao início</a>
    <h1>Design</h1>
    <p>Projetos visuais desenvolvidos.</p>
  </header>
</div>

<!-- CARROSSEL -->
<section class="slider-wrapper">
  <div class="slider-track">

    <!-- LACCA -->
    <div class="card" onclick="openModal()">
      <img src="lacca.png">
    </div>

    <!-- DUPLICAÇÃO PARA LOOP -->
    <div class="card" onclick="openModal()">
      <img src="lacca.png">
    </div>

  </div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">×</span>

    <h2>LACCA</h2>
    <p>Trabalho desenvolvido para a Lacca em 2024</p>

    <div class="grid">

      <!-- 19 IMAGENS -->
      <img src="lacca (1).png">
      <img src="lacca (2).png">
      <img src="lacca (3).png">
      <img src="lacca (4).png">
      <img src="lacca (5).png">
      <img src="lacca (6).png">
      <img src="lacca (7).png">
      <img src="lacca (8).png">
      <img src="lacca (9).png">
      <img src="lacca (10).png">
      <img src="lacca (11).png">
      <img src="lacca (12).png">
      <img src="lacca (13).png">
      <img src="lacca (14).png">
      <img src="lacca (15).png">
      <img src="lacca (16).png">
      <img src="lacca (17).png">
      <img src="lacca (18).png">
      <img src="lacca (19).png">

    </div>

  </div>
</div>

<script>
  function openModal() {
    document.getElementById("modal").style.display = "flex";
    document.body.style.overflow = "hidden";
  }

  function closeModal() {
    document.getElementById("modal").style.display = "none";
    document.body.style.overflow = "auto";
  }
</script>

</body>
</html>
