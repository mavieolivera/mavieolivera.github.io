<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design | Portfólio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #f2e8dc;
      --text-color: #121212;
      --accent-color: #be3f56;
      --card-radius: 24px;
      --card-width: 320px;
      --gap: 30px;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      overflow-x: hidden;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    header {
      padding-top: 4rem;
    }

    .back-link {
      display: inline-block;
      color: var(--accent-color);
      text-decoration: none;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      margin: 0;
      line-height: 0.95;
    }

    /* CARROSSEL */
    .slider-wrapper {
      width: 100%;
      padding: 60px 0;
      overflow: hidden;
    }

    .slider-track {
      display: flex;
      gap: var(--gap);
      width: max-content;
      animation: infiniteScroll 40s linear infinite;
    }

    .slider-wrapper:hover .slider-track {
      animation-play-state: paused;
    }

    .featured-item {
      flex: 0 0 var(--card-width);
      height: 420px;
      border-radius: var(--card-radius);
      overflow: hidden;
      transform: rotate(2deg);
      transition: all 0.4s ease;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .featured-item:hover {
      transform: rotate(0deg) scale(1.05);
      z-index: 5;
    }

    .featured-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @keyframes infiniteScroll {
      from { transform: translateX(0); }
      to { transform: translateX(calc(-1 * (320px + 30px) * 2)); } /* Ajustado para 2 itens únicos */
    }

    /* BOTÕES */
    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 60px;
    }

    .nav-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: white;
      transition: 0.3s;
    }

    .nav-btn:hover {
      background: var(--accent-color);
      color: white;
    }

    /* GRID */
    .more-work {
      padding: 80px 0;
    }

    .grid-archive {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
    }

    .archive-card {
      background: white;
      border-radius: var(--card-radius);
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
    }

    .archive-card:hover {
      transform: translateY(-5px);
    }

    .archive-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
    }

    .archive-info {
      padding: 1.5rem;
    }

 
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      padding: 20px;
    }

    .modal-content {
      background: white;
      max-width: 700px; 
      width: 100%;
      border-radius: 30px;
      padding: 30px; 
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      border: none;
      background: #eee;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      z-index: 10;
    }
  </style>
</head>

<body>

<div class="container">
  <header>
    <a class="back-link" href="index.html">← Voltar ao início</a>
    <h1>Design</h1>
    <p style="opacity:.7;">Destaques em movimento contínuo.</p>
  </header>
</div>

<section class="slider-wrapper">
  <div class="slider-track">
    <div class="featured-item" onclick="openModal('lacca-modal')">
      <img src="assets/LACCA.png">
    </div>
    <div class="featured-item" onclick="openModal('lacca-modal')">
      <img src="assets/KALOR.png">
    </div>
    <div class="featured-item" onclick="openModal('lacca-modal')">
      <img src="assets/GRANDESERTAOVEREDAS.jpg">
    </div>
    <div class="featured-item" onclick="openModal('lacca-modal')">
      <img src="assets/LACCA.png">
    </div>
     <div class="featured-item" onclick="openModal('lacca-modal')">
      <img src="assets/LACCA.png">
    </div>
     <div class="featured-item" onclick="openModal('lacca-modal')">
      <img src="assets/LACCA.png">
    </div>
  </div>
</section>

<div class="nav-buttons">
  <button class="nav-btn" onclick="move(-1)">←</button>
  <button class="nav-btn" onclick="move(1)">→</button>
</div>

<section class="more-work">
  <div class="container">
    <h2 style="text-align:center;">Mais trabalhos</h2>

    <div class="grid-archive">
      <div class="archive-card" onclick="openModal('lacca-modal')">
        <img src="assets/LACCA.png">
        <div class="archive-info">
          <h3>LACCA</h3>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="lacca-modal" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal-content">

      <img src="assets/lacca (6).png" style="width:100%;">
      <img src="assets/lacca (7).png" style="width:100%;">
      <img src="assets/lacca (8).png" style="width:100%;">
      <img src="assets/lacca (9).png" style="width:100%;">
      <img src="assets/lacca (10).png" style="width:100%;">
      <img src="assets/lacca (11).png" style="width:100%;">
      <img src="assets/lacca (12).png" style="width:100%;">
      <img src="assets/lacca (13).png" style="width:100%;">
      <img src="assets/lacca (14).png" style="width:100%;">
      <img src="assets/lacca (15).png" style="width:100%;">
      <img src="assets/lacca (16).png" style="width:100%;">
      <img src="assets/lacca (17).png" style="width:100%;">
      <img src="assets/lacca (18).png" style="width:100%;">
      <img src="assets/lacca (19).png" style="width:100%;">
    </div>
  </div>
</div>

<script>
function openModal(id) {
  document.getElementById(id).style.display = "flex";
  document.body.style.overflow = "hidden"; 
}

function hideAllModals() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = "none");
  document.body.style.overflow = "auto";
}

function closeModal(e) {
  if (e.target.classList.contains('modal-overlay')) hideAllModals();
}

function move(direction){

  document.querySelector('.slider-track').style.animation = 'none';
}
</script>

</body>
</html>
