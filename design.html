<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design | Portfólio Infinito</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #f2e8dc;
      --text-color: #121212;
      --accent-color: #be3f56;
      --card-radius: 24px;
      --card-width: 320px;
      --gap: 30px;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }

    header { padding-top: 4rem; }
    .back-link { display: inline-block; color: var(--accent-color); text-decoration: none; font-weight: 700; margin-bottom: 1.5rem; }

    h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 800; margin: 0; line-height: 0.95; }

    /* --- CARROSSEL INFINITO --- */
    .slider-wrapper {
      position: relative;
      width: 100%;
      padding: 60px 0;
      overflow: hidden;
    }

    .slider-track {
      display: flex;
      gap: var(--gap);
      width: max-content;
      animation: infiniteScroll 40s linear infinite;
    }

    /* Pausa a animação ao interagir */
    .slider-wrapper:hover .slider-track {
      animation-play-state: paused;
    }

    .featured-item {
      flex: 0 0 var(--card-width);
      height: 420px;
      border-radius: var(--card-radius);
      overflow: hidden;
      transform: rotate(2deg);
      transition: all 0.4s ease;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .featured-item:hover { transform: rotate(0deg) scale(1.05); z-index: 5; }
    .featured-item img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

    /* --- SETAS --- */
    .nav-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: -20px;
      margin-bottom: 60px;
    }

    .nav-btn {
      background: white;
      border: 1px solid rgba(0,0,0,0.1);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }

    .nav-btn:hover { background: var(--accent-color); color: white; }

    /* Animação de Rolagem Infinita */
    @keyframes infiniteScroll {
      from { transform: translateX(0); }
      /* Move exatamente a largura de metade dos cards (os originais) */
      to { transform: translateX(calc(-1 * (var(--card-width) + var(--gap)) * 6)); }
    }

    /* --- GRADE MAIS TRABALHO --- */
    .more-work { padding: 80px 0; border-top: 1px solid rgba(0,0,0,0.05); }
    .grid-archive { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
    .archive-card { background: #fff; border-radius: var(--card-radius); overflow: hidden; cursor: pointer; transition: 0.3s; }
    .archive-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
    .archive-info { padding: 1.5rem; }

    /* --- MODAL --- */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(10px); padding: 20px; }
    .modal-content { background: white; width: 100%; max-width: 1000px; max-height: 90vh; border-radius: 30px; padding: 40px; overflow-y: auto; position: relative; }
    .close-btn { position: sticky; top: 0; float: right; font-size: 32px; cursor: pointer; border: none; background: #f0f0f0; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

    @media (max-width: 768px) { .grid-archive { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <a class="back-link" href="index.html">← Voltar ao início</a>
      <h1>Design</h1>
      <p style="opacity: 0.7; margin-top: 10px;">Destaques em movimento contínuo.</p>
    </header>
  </div>

  <section class="slider-wrapper">
    <div class="slider-track" id="slider-track">
      
      <div class="featured-item" onclick="goToProject('frugo')"><img src="https://picsum.photos/seed/frugo/500/700"></div>
      <div class="featured-item" onclick="goToProject('nike')"><img src="https://picsum.photos/seed/nike/500/700"></div>
      <div class="featured-item" onclick="goToProject('jaffa')"><img src="https://picsum.photos/seed/art/500/700"></div>
      <div class="featured-item" onclick="goToProject('shack')"><img src="https://picsum.photos/seed/shake/500/700"></div>
      <div class="featured-item" onclick="goToProject('taça')"><img src="https://picsum.photos/seed/glass/500/700"></div>
      <div class="featured-item" onclick="goToProject('editorial')"><img src="https://picsum.photos/seed/book/500/700"></div>

      <div class="featured-item" onclick="goToProject('frugo')"><img src="https://picsum.photos/seed/frugo/500/700"></div>
      <div class="featured-item" onclick="goToProject('nike')"><img src="https://picsum.photos/seed/nike/500/700"></div>
      <div class="featured-item" onclick="goToProject('jaffa')"><img src="https://picsum.photos/seed/art/500/700"></div>
      <div class="featured-item" onclick="goToProject('shack')"><img src="https://picsum.photos/seed/shake/500/700"></div>
      <div class="featured-item" onclick="goToProject('taça')"><img src="https://picsum.photos/seed/glass/500/700"></div>
      <div class="featured-item" onclick="goToProject('editorial')"><img src="https://picsum.photos/seed/book/500/700"></div>
    </div>
  </section>

  <div class="nav-buttons">
    <button class="nav-btn" onclick="manualMove(-1)">←</button>
    <button class="nav-btn" onclick="manualMove(1)">→</button>
  </div>

  <section id="mais-trabalho" class="more-work">
    <div class="container">
      <h2 style="text-align: center; margin-bottom: 3rem;">MAIS TRABALHO</h2>
      <div class="grid-archive">
        <div class="archive-card" id="card-frugo" onclick="openModal('frugo-modal')">
          <img src="https://picsum.photos/seed/frugo/500/500"><div class="archive-info"><h3>FRUGO</h3></div>
        </div>
        <div class="archive-card" id="card-nike" onclick="openModal('nike-modal')">
          <img src="https://picsum.photos/seed/nike/500/500"><div class="archive-info"><h3>NIKE</h3></div>
        </div>
        </div>
    </div>
  </section>

  <div id="frugo-modal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-content">
      <button class="close-btn" onclick="hideAllModals()">&times;</button>
      <h2 style="text-align:center; font-size: 2.5rem;">FRUGO</h2>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px;">
        <img src="https://picsum.photos/seed/f1/600/600" style="width:100%; border-radius:15px;">
        <img src="https://picsum.photos/seed/f2/600/600" style="width:100%; border-radius:15px;">
      </div>
    </div>
  </div>

  <script>
    const track = document.getElementById('slider-track');
    let scrollPos = 0;

    // Função para mover manualmente (desativa a animação CSS temporariamente)
    function manualMove(direction) {
      track.style.animation = 'none'; // Para a animação
      scrollPos -= direction * (320 + 30);
      track.style.transform = `translateX(${scrollPos}px)`;
    }

    function goToProject(projectId) {
      document.getElementById('mais-trabalho').scrollIntoView({ behavior: 'smooth' });
      setTimeout(() => { openModal(projectId + '-modal'); }, 700);
    }

    function openModal(modalId) {
      const m = document.getElementById(modalId);
      if(m) { m.style.display = 'flex'; document.body.style.overflow = 'hidden'; }
    }

    function hideAllModals() {
      document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
      document.body.style.overflow = 'auto';
    }

    function closeModal(event) {
      if (event.target.classList.contains('modal-overlay')) hideAllModals();
    }
  </script>
</body>
</html>
