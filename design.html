<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Design | Portfólio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f2e8dc;
      --text: #121212;
      --accent: #be3f56;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .back-link {
      text-decoration: none;
      color: var(--accent);
      font-weight: 700;
    }

    /* CARD */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      margin-top: 40px;
    }

    .card {
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      background: #fff;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      display: block;
    }

    .card-info {
      padding: 20px;
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 999;
    }

    .modal-content {
      background: white;
      width: 100%;
      max-width: 1000px;
      max-height: 90vh;
      overflow-y: auto;
      border-radius: 30px;
      padding: 40px;
      position: relative;
    }

    .close-btn {
      position: absolute;
      right: 20px;
      top: 20px;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: none;
      background: #eee;
      font-size: 20px;
      cursor: pointer;
    }

    /* 🔥 GALERIA CORRIGIDA */
    .modal-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .modal-gallery img {
      width: 100%;
      border-radius: 16px;
      display: block;
    }

    @media (max-width: 768px) {
      .modal-content {
        padding: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <a href="index.html" class="back-link">← Voltar ao início</a>
    <h1>Design</h1>
    <p>Projetos visuais desenvolvidos.</p>

    <!-- GRID -->
    <div class="grid">

      <!-- LACCA -->
      <div class="card" onclick="openModal()">
        <img src="assets/LACCA.png" alt="Projeto LACCA">
        <div class="card-info">
          <h3>LACCA</h3>
          <p>Parte do trabalho desenvolvido para o laboratório Lacca</p>
        </div>
      </div>

    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal-content">
      <button class="close-btn" onclick="hideModal()">✕</button>

      <h2 style="text-align:center;">LACCA</h2>
      <p style="text-align:center;">Parte do trabalho desenvolvido para o laboratório Lacca</p>

      <div class="modal-gallery">
        <img src="assets/lacca (1).png">
        <img src="assets/lacca (2).png">
        <img src="assets/lacca (3).png">
        <img src="assets/lacca (4).png">
        <img src="assets/lacca (5).png">
        <img src="assets/lacca (6).png">
        <img src="assets/lacca (7).png">
        <img src="assets/lacca (8).png">
        <img src="assets/lacca (9).png">
        <img src="assets/lacca (10).png">
        <img src="assets/lacca (11).png">
        <img src="assets/lacca (12).png">
        <img src="assets/lacca (13).png">
        <img src="assets/lacca (14).png">
        <img src="assets/lacca (15).png">
        <img src="assets/lacca (16).png">
        <img src="assets/lacca (17).png">
        <img src="assets/lacca (18).png">
        <img src="assets/lacca (19).png">
      </div>

    </div>
  </div>

  <script>
    function openModal() {
      document.getElementById("modal").style.display = "flex";
      document.body.style.overflow = "hidden";
    }

    function hideModal() {
      document.getElementById("modal").style.display = "none";
      document.body.style.overflow = "auto";
    }

    function closeModal(e) {
      if (e.target.classList.contains("modal-overlay")) {
        hideModal();
      }
    }
  </script>

</body>
</html>
