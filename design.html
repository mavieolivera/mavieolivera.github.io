<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Design | Portfólio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #f2e8dc;
      --text-color: #121212;
      --accent-color: #be3f56;
      --card-radius: 24px;
      --card-width: 320px;
      --gap: 30px;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      overflow-x: hidden;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    header {
      padding-top: 4rem;
    }

    .back-link {
      display: inline-block;
      color: var(--accent-color);
      text-decoration: none;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      margin: 0;
    }

    /* CARROSSEL */
    .slider-wrapper {
      width: 100%;
      padding: 60px 0;
      overflow: hidden;
    }

    .slider-track {
      display: flex;
      gap: var(--gap);
      width: max-content;
      animation: scroll 35s linear infinite;
    }

    .slider-wrapper:hover .slider-track {
      animation-play-state: paused;
    }

    .featured-item {
      flex: 0 0 var(--card-width);
      height: 420px;
      border-radius: var(--card-radius);
      overflow: hidden;
      transform: rotate(2deg);
      transition: .4s;
      cursor: pointer;
    }

    .featured-item:hover {
      transform: rotate(0deg) scale(1.05);
    }

    .featured-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @keyframes scroll {
      from { transform: translateX(0); }
      to { transform: translateX(-700px); }
    }

    /* GRID */
    .more-work {
      padding: 80px 0;
    }

    .grid-archive {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px,1fr));
      gap: 25px;
    }

    .archive-card {
      background: white;
      border-radius: var(--card-radius);
      overflow: hidden;
      cursor: pointer;
      transition: .3s;
    }

    .archive-card:hover {
      transform: translateY(-5px);
    }

    .archive-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
    }

    .archive-info {
      padding: 1.5rem;
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      padding: 20px;
    }

    .modal-content {
      background: white;
      width: 100%;
      max-width: 1000px;
      border-radius: 30px;
      padding: 40px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .close-btn {
      position: absolute;
      right: 40px;
      top: 30px;
      border: none;
      background: #eee;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div class="container">
  <header>
    <a class="back-link" href="index.html">← Voltar ao início</a>
    <h1>Design</h1>
    <p style="opacity:.7;">Destaques em movimento contínuo.</p>
  </header>
</div>

<!-- CARROSSEL -->
<section class="slider-wrapper">
  <div class="slider-track">

    <div class="featured-item" onclick="openModal()">
      <img src="assets/lacca (1).png">
    </div>

    <div class="featured-item" onclick="openModal()">
      <img src="assets/lacca (1).png">
    </div>

    <div class="featured-item" onclick="openModal()">
      <img src="assets/lacca (1).png">
    </div>

  </div>
</section>

<!-- GRID -->
<section class="more-work">
  <div class="container">

    <h2 style="text-align:center;">Mais trabalhos</h2>

    <div class="grid-archive">

      <div class="archive-card" onclick="openModal()">
        <img src="assets/lacca (1).png">
        <div class="archive-info">
          <h3>LACCA</h3>
        </div>
      </div>

    </div>

  </div>
</section>

<!-- MODAL -->
<div id="modal" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal-content">
    <button class="close-btn" onclick="hideModal()">×</button>

    <h2 style="text-align:center;">LACCA</h2>

    <p style="text-align:center; margin-bottom:30px;">
      Trabalho desenvolvido para a Lacca em 2024
    </p>

    <div style="
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    ">

      <img src="assets/lacca (1).png">
      <img src="assets/lacca (2).png">
      <img src="assets/lacca (3).png">
      <img src="assets/lacca (4).png">
      <img src="assets/lacca (5).png">
      <img src="assets/lacca (6).png">
      <img src="assets/lacca (7).png">
      <img src="assets/lacca (8).png">
      <img src="assets/lacca (9).png">
      <img src="assets/lacca (10).png">
      <img src="assets/lacca (11).png">
      <img src="assets/lacca (12).png">
      <img src="assets/lacca (13).png">
      <img src="assets/lacca (14).png">
      <img src="assets/lacca (15).png">
      <img src="assets/lacca (16).png">
      <img src="assets/lacca (17).png">
      <img src="assets/lacca (18).png">
      <img src="assets/lacca (19).png">

    </div>
  </div>
</div>

<script>
function openModal(){
  document.getElementById("modal").style.display = "flex";
}

function hideModal(){
  document.getElementById("modal").style.display = "none";
}

function closeModal(e){
  if(e.target.id === "modal") hideModal();
}
</script>

</body>
</html>
